<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0d1420"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066ff"/>
      <stop offset="100%" stop-color="#00f3ff"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f2c9a0"/>
      <stop offset="100%" stop-color="#e0aa78"/>
    </linearGradient>
    <linearGradient id="jacket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- glow rings -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#00f3ff" stroke-opacity="0.15" stroke-width="2"/>
  <circle cx="200" cy="200" r="150" fill="none" stroke="#00f3ff" stroke-opacity="0.1" stroke-width="1"/>

  <!-- shoulders / jacket -->
  <path d="M90 400 C90 300 150 270 200 270 C250 270 310 300 310 400 Z" fill="url(#jacket)"/>
  <path d="M150 300 L200 340 L250 300 L235 400 L165 400 Z" fill="#0a0a0a"/>

  <!-- neck -->
  <rect x="180" y="230" width="40" height="50" fill="url(#skin)"/>

  <!-- face -->
  <path d="M200 90 C255 90 270 140 265 185 C262 225 235 260 200 260 C165 260 138 225 135 185 C130 140 145 90 200 90 Z" fill="url(#skin)"/>

  <!-- hair back -->
  <path d="M120 190 C110 120 150 60 200 60 C250 60 290 120 280 190 C270 150 250 170 240 140 C220 170 190 130 180 150 C160 130 150 170 140 150 C135 170 130 180 120 190 Z" fill="url(#hair)"/>

  <!-- hair spikes -->
  <path d="M130 100 L150 60 L165 105 Z" fill="url(#hair)"/>
  <path d="M170 80 L190 40 L205 85 Z" fill="url(#hair)"/>
  <path d="M210 80 L235 45 L245 90 Z" fill="url(#hair)"/>
  <path d="M250 100 L275 70 L270 115 Z" fill="url(#hair)"/>

  <!-- eyes -->
  <ellipse cx="172" cy="185" rx="12" ry="16" fill="#0a0a0a"/>
  <ellipse cx="228" cy="185" rx="12" ry="16" fill="#0a0a0a"/>
  <circle cx="176" cy="180" r="4" fill="#00f3ff"/>
  <circle cx="232" cy="180" r="4" fill="#00f3ff"/>

  <!-- eyebrows -->
  <rect x="158" y="160" width="28" height="4" rx="2" fill="#3a2a1a"/>
  <rect x="214" y="160" width="28" height="4" rx="2" fill="#3a2a1a"/>

  <!-- nose -->
  <path d="M200 195 L195 215 L205 215 Z" fill="#d99f6c"/>

  <!-- mouth -->
  <path d="M182 232 Q200 244 218 232" stroke="#a5623c" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- cyber visor accent -->
  <path d="M150 178 L250 178" stroke="#00f3ff" stroke-width="2" stroke-opacity="0.5"/>
</svg>
